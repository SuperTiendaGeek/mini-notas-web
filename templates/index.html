<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mini Notas Web</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap');

        :root {
            --bg: #f3f6fb;
            --card: #ffffff;
            --text: #1f2a37;
            --muted: #5b6470;
            --border: #d8e0ea;
            --accent: #1d4ed8;
            --accent-hover: #1e40af;
            --item-bg: #f8fbff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Manrope", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 10% 10%, #ffffff 0%, transparent 28%),
                radial-gradient(circle at 90% 90%, #e8f0ff 0%, transparent 32%),
                var(--bg);
        }

        .card {
            width: min(680px, 100%);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 14px 32px rgba(26, 41, 61, 0.08);
        }

        h1 {
            margin: 0 0 20px;
            font-size: clamp(1.5rem, 2.4vw, 1.9rem);
            letter-spacing: -0.02em;
        }

        form {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .actions {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 24px;
        }

        .actions form {
            margin-bottom: 0;
        }

        input[type="text"] {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 1rem;
            color: var(--text);
            background: #fff;
            transition: border-color 0.18s ease, box-shadow 0.18s ease;
        }

        input[type="text"]::placeholder {
            color: #8a94a3;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #7da2ff;
            box-shadow: 0 0 0 4px rgba(29, 78, 216, 0.12);
        }

        button[type="submit"] {
            border: none;
            border-radius: 12px;
            padding: 0 18px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.12s ease, background 0.2s ease, opacity 0.2s ease;
            height: 44px;
        }

        .btn-primary {
            color: #fff;
            background: linear-gradient(180deg, #2563eb 0%, var(--accent) 100%);
        }

        .btn-primary:hover {
            background: linear-gradient(180deg, #1d4ed8 0%, var(--accent-hover) 100%);
            transform: translateY(-1px);
        }

        .btn-clear {
            color: #b42318;
            background: #fff5f5;
            border: 1px solid #f4c8c5 !important;
            padding: 0 14px;
        }

        .btn-clear:hover {
            background: #ffeaea;
            transform: translateY(-1px);
        }

        h2 {
            margin: 0 0 12px;
            font-size: 1.05rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 10px;
        }

        li {
            background: var(--item-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            line-height: 1.45;
            word-break: break-word;
        }

        .empty {
            margin: 0;
            padding: 10px 2px;
            color: #7d8694;
            font-style: italic;
        }

        @media (max-width: 560px) {
            .card {
                padding: 22px 16px;
            }

            form {
                flex-direction: column;
            }

            .actions {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Mini Notas Web</h1>

        <div class="actions">
            <form method="POST">
                <input type="text" name="nota" placeholder="Escribe una nota" required>
                <button type="submit" class="btn-primary">Guardar</button>
            </form>

            {% if notas %}
                <form method="POST">
                    <input type="hidden" name="clear" value="1">
                    <button type="submit" class="btn-clear">Clear all</button>
                </form>
            {% endif %}
        </div>

        <h2>Notas</h2>
        {% if notas %}
            <ul>
                {% for nota in notas %}
                    <li>{{ nota }}</li>
                {% endfor %}
            </ul>
        {% else %}
            <p class="empty">Aun no hay notas. Agrega la primera.</p>
        {% endif %}
    </main>
</body>
</html>
